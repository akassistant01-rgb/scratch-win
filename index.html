<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Scratch & Win</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f5f5f5;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      padding:20px;
    }

    .container{
      background:white;
      width:100%;
      max-width:420px;
      padding:35px 25px;
      border-radius:18px;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
      text-align:center;
    }

    .logo{
      width:120px;
      margin-bottom:20px;
    }

    h1{
      font-size:28px;
      margin-bottom:15px;
      color:#222;
    }

    p{
      color:#666;
      font-size:16px;
      line-height:1.6;
      margin-bottom:30px;
    }

    input{
      width:100%;
      padding:16px;
      border:1px solid #ddd;
      border-radius:12px;
      font-size:16px;
      margin-bottom:18px;
      outline:none;
    }

    input:focus{
      border-color:#000;
    }

    button{
      width:100%;
      padding:16px;
      border:none;
      border-radius:12px;
      background:#000;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      opacity:0.9;
    }

    .footer{
      margin-top:25px;
      font-size:13px;
      color:#999;
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- LOGO -->
    <img 
      src="https://upload.wikimedia.org/wikipedia/commons/a/ab/Logo_TV_2015.png" 
      alt="Logo"
      class="logo"
    >

    <h1>Scratch & Win 🎉</h1>

    <p>
      Congratulations lucky winner!<br>
      Please enter your unique winning code below.
    </p>

    <form id="codeForm">

      <input 
        type="text"
        id="winningCode"
        placeholder="Enter your winning code"
        required
      >

      <button type="submit">
        Submit
      </button>

    </form>

    <div class="footer">
      Powered by Scratch & Win Campaign
    </div>

  </div>

  <script>

    document
      .getElementById("codeForm")
      .addEventListener("submit", async function(e){

        e.preventDefault();

        const code = document
          .getElementById("winningCode")
          .value;

        // TEMP TEST
        alert("Code submitted: " + code);

        /*
        هون لاحقاً رح نربطه مع n8n webhook
        */

      });

  </script>

</body>
</html>
